include-file = ~/.config/polybar/colors.ini

[bar/main]
;monitor = ${env:MONITOR:HDMI-1}
width = 100%
height = 25
; offset-x = 5%
; offset-y = 1%
radius = 0
fixed-center = true
background = ${color.black}
foreground = ${color.white}
line-size = 1
underline-size = 1
; line-color = #f00
border-size = 0
border-color = #1d2021
padding-left = 0
padding-right = 0
module-margin-left = 1
module-margin-right = 1
font-0 = JetBrains Mono Nerd Font:style=Regular:size=10;1
font-1 = Noto Sans Thai:style=Regular:size=10;1
font-2 = Noto Sans Mono CJK JP:style=Regular:size=10;1
; font-1 = unifont:fontformat=truetype:size=8:antialias=false;0
; font-2 = siji:pixelsize=10;1
modules-left = bspwm launcher feh-prev feh-next close-window
modules-center = xwindow
modules-right = tray xkeyboard pulseaudio network battery date powermenu
; tray-position = right
; tray-padding = 10
wm-restack = bspwm
;override-redirect = true
;scroll-up = bspwm-desknext
;scroll-down = bspwm-deskprev
;scroll-up = i3wm-wsnext
;scroll-down = i3wm-wsprev
cursor-click = pointer
cursor-scroll = ns-resize

[module/battery]
type = internal/battery
full-at = 100
low-at = 20
label-charging = %percentage%%  󱐋
label-discharging = %percentage%% 
label-full = %percentage%% 
label-low = %percentage%% 
battery = BAT0
adapter = AC
poll-interval = 600

[module/launcher]
type = custom/script
label = " ◧ "
label-foreground = ${color.white}
; label-background = ${color.red}
exec = ''
click-left = rofi -i -show drun -show-icons true
tail = true

[module/close-window]
type = custom/script
label = " ⌫ "
label-foreground = ${color.red}
; label-background = ${color.red}
exec = ''
;click-middle = bspc node -c
click-left = bspc node -c
tail = true

[module/feh-prev]
type = custom/script
label = " ◁ "
label-foreground = ${color.white}
; label-background = ${color.teal}
exec = ''
click-left = $HOME/.script/fehcycle.sh prev
tail = true

[module/feh-next]
type = custom/script
label = " ▶ "
label-foreground = ${color.white}
; label-background = ${color.teal}
exec = ''
click-left = $HOME/.script/fehcycle.sh next
tail = true

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/tray]
type = internal/tray
tray-size = 15
tray-padding = 5px

[module/xkeyboard]
type = internal/xkeyboard
format-prefix = " "
label-layout = %layout%
label-indicator-padding = 1
label-indicator-margin = 1
label-indicator-background = ${color.red}
label-indicator-foreground = ${color.black}
; label-indicator-on-capslock = CAPS

[module/filesystem]
type = internal/fs
mount-0 = /
label-mounted = "%percentage_used%% "
label-unmounted = %mountpoint% not mounted
; label-unmounted-foreground = ${color.yellow}
interval = 600

[module/bspwm]
type = internal/bspwm
label-focused = %name%
label-focused-background = ${color.white}
label-focused-foreground = ${color.black}
; label-focused-underline= ${color.yellow}
label-focused-padding = 2
label-occupied = %name%
label-occupied-foreground = ${color.white}
; label-occupied-underline= ${color.white}
label-occupied-background= ${color.grey}
label-occupied-padding = 2
label-urgent = %name%
; label-urgent-foreground = ${color.white}
label-urgent-padding = 2
label-empty = %name%
; label-empty-foreground = ${color.white}
label-empty-padding = 2
; Separator in between workspaces
; label-separator = |

[module/cpu]
type = internal/cpu
format-suffix = " "
; format-prefix-foreground = ${color.white}
; format-underline = #f90000
label = %percentage:2%%
interval = 60

[module/memory]
type = internal/memory
format-suffix = " "
; format-prefix-foreground = ${color.white}
; format-underline = #4bffdc
label = %percentage_used%%
; format-connected = <ramp-signal> <label-connected>
; format-connected-underline = #9f78e1
; label-connected = %local_ip%
; ramp-signal-0 = 󰖂
; ramp-signal-foreground = ${color.white}
interval = 60

[module/network]
type = internal/network
interface = wlan0
interval = 600
format-connected = <label-connected> <ramp-signal>
; format-connected-underline = #9f78e1
; label-connected = %essid%
label-connected = "%{A1:iwmenu --launcher rofi:}%essid%%{A}"
; label-connected = "%{A1:iwmenu --launcher rofi:}%local_ip%%{A}"
; label-connected = "%local_ip%"
format-disconnected = "%{A1:iwmenu --launcher rofi:}disconnected 󰤮%{A}"
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}
ramp-signal-4 = 󰤨
ramp-signal-3 = 󰤥
ramp-signal-2 = 󰤢
ramp-signal-1 = 󰤟
ramp-signal-0 = 󰤯
; ramp-signal-foreground = ${color.white}

[module/date]
type = internal/date
interval = 60
; date = " %d-%m-%Y"
date-alt = " %d-%m-%Y"
time = %H:%M
time-alt = %H:%M
; format-prefix = "date "
; format-prefix-foreground = ${colors.foreground-alt}
; format-underline = #0a6cf5
label = %date% %time%
; label = "%{A2:GDK_DPI_SCALE=1.5 yad --calendar --no-buttons --width=500 --height=350:}%date% %time%%{A}"
; label-foreground = ${color.white}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume> <bar-volume>
; format-volume-foreground = ${color.white}
label-volume = %percentage%
format-volume-prefix = "  "
; format-volume-prefix-foreground = ${color.white}
label-muted =   muted
label-muted-foreground = ${color.red}
bar-volume-width = 6
bar-volume-foreground-0 = ${color.green}
bar-volume-foreground-1 = ${color.green}
bar-volume-foreground-2 = ${color.green}
bar-volume-foreground-3 = ${color.green}
bar-volume-foreground-4 = ${color.green}
bar-volume-foreground-5 = ${color.yellow}
bar-volume-foreground-6 = ${color.red}
bar-volume-gradient = false
bar-volume-indicator = |
; bar-volume-indicator-foreground = ${color.white}
bar-volume-indicator-font = 2
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
; bar-volume-empty-foreground = ${color.white}
click-middle = pavucontrol-qt

[module/powermenu]
type = custom/menu
expand-right = false
format-spacing = 1
label-open = "  "
label-open-foreground = ${color.teal}
; label-open-background = ${color.red}
label-close = "  "
label-close-foreground = ${color.teal}
label-separator = |
; label-separator-foreground = ${color.white}
menu-0-0 = poweroff
menu-0-0-foreground = ${color.red}
menu-0-0-exec = sudo poweroff
menu-0-1 = reboot
menu-0-1-foreground = ${color.yellow}
menu-0-1-exec = sudo reboot

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0
