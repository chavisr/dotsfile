[env]
TERM = "xterm-256color"

[font]
size = 12

[font.normal]
family = "JetBrains Mono Nerd Font"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
regex = "(https:|http:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.mouse]
enabled = true
mods = "Control"

[selection]
save_to_clipboard = true

[window]
opacity = 0.97
dynamic_padding = false
padding = { x = 9, y = 6 }

[general]
import = ["~/.config/alacritty/themes/one_dark_chad.toml"]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\n"
